<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" fill="none">
  <!-- Hacker Cat Mascot - Klaus Kode -->

  <!-- Hoodie -->
  <path d="M90 175 Q100 130 200 120 Q300 130 310 175 L320 320 Q310 340 200 345 Q90 340 80 320Z" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>
  <!-- Hoodie hood -->
  <path d="M95 180 Q100 120 200 105 Q300 120 305 180 Q280 160 200 155 Q120 160 95 180Z" fill="#242c38" stroke="#30363d" stroke-width="1"/>
  <!-- Hood inner shadow -->
  <path d="M110 178 Q115 140 200 128 Q285 140 290 178 Q270 162 200 158 Q130 162 110 178Z" fill="#161b22"/>

  <!-- Head -->
  <ellipse cx="200" cy="165" rx="82" ry="75" fill="#1c2128" stroke="#484f58" stroke-width="1.5"/>

  <!-- Ears poking through hood -->
  <path d="M130 115 L115 65 L155 105Z" fill="#1c2128" stroke="#484f58" stroke-width="1.5"/>
  <path d="M270 115 L285 65 L245 105Z" fill="#1c2128" stroke="#484f58" stroke-width="1.5"/>
  <!-- Inner ears -->
  <path d="M133 110 L122 75 L150 105Z" fill="#2d1f3d"/>
  <path d="M267 110 L278 75 L250 105Z" fill="#2d1f3d"/>

  <!-- Face -->
  <!-- Eyes - large, glowing green like a terminal -->
  <ellipse cx="170" cy="165" rx="20" ry="22" fill="#0d1117" stroke="#3fb950" stroke-width="2"/>
  <ellipse cx="230" cy="165" rx="20" ry="22" fill="#0d1117" stroke="#3fb950" stroke-width="2"/>
  <!-- Pupils - vertical slits -->
  <ellipse cx="172" cy="165" rx="5" ry="16" fill="#3fb950"/>
  <ellipse cx="232" cy="165" rx="5" ry="16" fill="#3fb950"/>
  <!-- Eye glow -->
  <ellipse cx="172" cy="165" rx="8" ry="18" fill="#3fb950" opacity="0.15"/>
  <ellipse cx="232" cy="165" rx="8" ry="18" fill="#3fb950" opacity="0.15"/>
  <!-- Eye shine -->
  <circle cx="177" cy="158" r="4" fill="#fff" opacity="0.6"/>
  <circle cx="237" cy="158" r="4" fill="#fff" opacity="0.6"/>

  <!-- Nose -->
  <path d="M195 190 L200 197 L205 190Z" fill="#484f58"/>

  <!-- Smirk -->
  <path d="M185 205 Q200 215 220 203" stroke="#484f58" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="110" y1="185" x2="155" y2="192" stroke="#484f58" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="108" y1="200" x2="155" y2="200" stroke="#484f58" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="110" y1="215" x2="155" y2="208" stroke="#484f58" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="290" y1="185" x2="245" y2="192" stroke="#484f58" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="292" y1="200" x2="245" y2="200" stroke="#484f58" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="290" y1="215" x2="245" y2="208" stroke="#484f58" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Laptop -->
  <g transform="translate(115, 280)">
    <!-- Laptop base -->
    <rect x="0" y="30" width="170" height="10" rx="3" fill="#30363d" stroke="#484f58" stroke-width="1"/>
    <!-- Laptop screen -->
    <rect x="15" y="-5" width="140" height="38" rx="4" fill="#0d1117" stroke="#484f58" stroke-width="1.5"/>
    <!-- Screen content - code lines -->
    <rect x="22" y="2" width="45" height="3" rx="1" fill="#58a6ff" opacity="0.8"/>
    <rect x="22" y="8" width="70" height="3" rx="1" fill="#3fb950" opacity="0.6"/>
    <rect x="22" y="14" width="35" height="3" rx="1" fill="#bc8cff" opacity="0.6"/>
    <rect x="62" y="14" width="50" height="3" rx="1" fill="#8b949e" opacity="0.5"/>
    <rect x="22" y="20" width="55" height="3" rx="1" fill="#58a6ff" opacity="0.5"/>
    <rect x="22" y="26" width="40" height="3" rx="1" fill="#3fb950" opacity="0.7"/>
    <!-- Screen glow -->
    <rect x="15" y="-5" width="140" height="38" rx="4" fill="#58a6ff" opacity="0.03"/>
    <!-- Cursor blink -->
    <rect x="67" y="26" width="2" height="4" fill="#3fb950">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Paws on laptop -->
  <!-- Left paw -->
  <ellipse cx="160" cy="305" rx="18" ry="10" fill="#1c2128" stroke="#484f58" stroke-width="1"/>
  <circle cx="150" cy="303" r="4" fill="#1c2128" stroke="#484f58" stroke-width="0.8"/>
  <circle cx="156" cy="299" r="4" fill="#1c2128" stroke="#484f58" stroke-width="0.8"/>
  <circle cx="163" cy="298" r="4" fill="#1c2128" stroke="#484f58" stroke-width="0.8"/>
  <!-- Right paw -->
  <ellipse cx="240" cy="305" rx="18" ry="10" fill="#1c2128" stroke="#484f58" stroke-width="1"/>
  <circle cx="237" cy="298" r="4" fill="#1c2128" stroke="#484f58" stroke-width="0.8"/>
  <circle cx="244" cy="299" r="4" fill="#1c2128" stroke="#484f58" stroke-width="0.8"/>
  <circle cx="250" cy="303" r="4" fill="#1c2128" stroke="#484f58" stroke-width="0.8"/>

  <!-- Tail curving from behind -->
  <path d="M310 300 Q340 280 345 250 Q348 230 340 215 Q335 208 325 210" stroke="#1c2128" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M310 300 Q340 280 345 250 Q348 230 340 215 Q335 208 325 210" stroke="#484f58" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Hoodie string -->
  <line x1="185" y1="230" x2="180" y2="270" stroke="#484f58" stroke-width="1"/>
  <line x1="215" y1="230" x2="220" y2="270" stroke="#484f58" stroke-width="1"/>
  <circle cx="180" cy="272" r="3" fill="#484f58"/>
  <circle cx="220" cy="272" r="3" fill="#484f58"/>

  <!-- Subtle glow from screen on face -->
  <ellipse cx="200" cy="200" rx="60" ry="30" fill="#58a6ff" opacity="0.04"/>

  <!-- Floating code symbols -->
  <text x="50" y="90" font-family="monospace" font-size="14" fill="#58a6ff" opacity="0.3">git push</text>
  <text x="300" y="80" font-family="monospace" font-size="12" fill="#3fb950" opacity="0.25">&lt;PR/&gt;</text>
  <text x="330" y="370" font-family="monospace" font-size="11" fill="#bc8cff" opacity="0.2">async</text>
  <text x="40" y="360" font-family="monospace" font-size="13" fill="#58a6ff" opacity="0.2">$ claude</text>
</svg>
