<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Robot Cat Mascot -->

  <!-- Ears -->
  <path d="M120 140 L95 60 L160 120Z" fill="#30363d" stroke="#58a6ff" stroke-width="2"/>
  <path d="M280 140 L305 60 L240 120Z" fill="#30363d" stroke="#58a6ff" stroke-width="2"/>
  <!-- Inner ears -->
  <path d="M125 130 L110 80 L155 120Z" fill="#1c2128"/>
  <path d="M275 130 L290 80 L245 120Z" fill="#1c2128"/>

  <!-- Head -->
  <rect x="105" y="110" width="190" height="170" rx="40" fill="#30363d" stroke="#58a6ff" stroke-width="2"/>

  <!-- Face plate -->
  <rect x="125" y="130" width="150" height="130" rx="25" fill="#1c2128" stroke="#484f58" stroke-width="1"/>

  <!-- Eyes -->
  <circle cx="170" cy="185" r="22" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
  <circle cx="230" cy="185" r="22" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
  <!-- Pupils - glowing -->
  <circle cx="174" cy="182" r="10" fill="#58a6ff"/>
  <circle cx="234" cy="182" r="10" fill="#58a6ff"/>
  <!-- Eye shine -->
  <circle cx="178" cy="178" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="238" cy="178" r="4" fill="#fff" opacity="0.8"/>

  <!-- Nose -->
  <path d="M193 210 L200 218 L207 210Z" fill="#58a6ff"/>

  <!-- Mouth -->
  <path d="M175 228 Q200 245 225 228" stroke="#484f58" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="100" y1="200" x2="145" y2="210" stroke="#484f58" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="220" x2="145" y2="220" stroke="#484f58" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="240" x2="145" y2="230" stroke="#484f58" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="300" y1="200" x2="255" y2="210" stroke="#484f58" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="300" y1="220" x2="255" y2="220" stroke="#484f58" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="300" y1="240" x2="255" y2="230" stroke="#484f58" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Antenna -->
  <line x1="200" y1="110" x2="200" y2="70" stroke="#58a6ff" stroke-width="2"/>
  <circle cx="200" cy="65" r="8" fill="#58a6ff" opacity="0.8"/>
  <circle cx="200" cy="65" r="4" fill="#fff" opacity="0.5"/>

  <!-- Body -->
  <rect x="130" y="275" width="140" height="80" rx="20" fill="#30363d" stroke="#58a6ff" stroke-width="2"/>

  <!-- Chest panel -->
  <rect x="160" y="290" width="80" height="40" rx="8" fill="#1c2128" stroke="#484f58" stroke-width="1"/>

  <!-- Heart/code symbol on chest -->
  <text x="200" y="316" text-anchor="middle" font-family="monospace" font-size="18" fill="#58a6ff">&lt;/&gt;</text>

  <!-- Arms -->
  <rect x="95" y="285" width="40" height="15" rx="7" fill="#30363d" stroke="#58a6ff" stroke-width="2"/>
  <rect x="265" y="285" width="40" height="15" rx="7" fill="#30363d" stroke="#58a6ff" stroke-width="2"/>

  <!-- Paws -->
  <circle cx="93" cy="292" r="8" fill="#30363d" stroke="#58a6ff" stroke-width="2"/>
  <circle cx="307" cy="292" r="8" fill="#30363d" stroke="#58a6ff" stroke-width="2"/>

  <!-- Tail -->
  <path d="M270 340 Q320 340 330 300 Q335 280 350 275" stroke="#58a6ff" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Feet -->
  <ellipse cx="165" cy="358" rx="25" ry="12" fill="#30363d" stroke="#58a6ff" stroke-width="2"/>
  <ellipse cx="235" cy="358" rx="25" ry="12" fill="#30363d" stroke="#58a6ff" stroke-width="2"/>
</svg>
